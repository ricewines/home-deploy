# docker-compose.yml
services:
  nginx:
    image: 'swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/nginx:1'
    volumes:
      - '~/run:/run/html:ro'
      - '~\IdeaProjects\ricewines\home-deploy\chixuehuidocker\invest-page\nginx.conf:/etc/nginx/conf.d/default.conf'
    ports:
      - '7080:80'
    networks:
      - shared
    restart: unless-stopped

  accounting:
    env_file:
      - 'D:\Users\CXH\data\secret\.env.secret.txt'
    image: 'swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/eclipse-temurin:25.0.3_9-jdk'
    restart: unless-stopped
    working_dir: /
    command: 'java -jar app.jar --spring.profiles.active=chixuehuidocker'
    networks:
      - shared
    volumes:
      - '~/run/invest/accounting/build/libs/accounting-0.1.19.jar:/app.jar'
      - '~/IdeaProjects/ricewines/home-deploy/chixuehuidocker/invest-page/common-chixuehuidocker.yml:/deploy/chixuehuidocker/common-chixuehuidocker.yml'
    ports:
      - "8081:8080"
  macro:
    env_file:
      - 'D:\Users\CXH\data\secret\.env.secret.txt'
    image: 'swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/eclipse-temurin:25.0.3_9-jdk'
    restart: unless-stopped
    working_dir: /
    command: 'java -jar app.jar --spring.profiles.active=chixuehuidocker'
    networks:
      - shared
    volumes:
      - '~/run/invest/macro/build/libs/macro-0.1.19.jar:/app.jar'
      - '~/IdeaProjects/ricewines/home-deploy/chixuehuidocker/invest-page/common-chixuehuidocker.yml:/deploy/chixuehuidocker/common-chixuehuidocker.yml'
    ports:
      - "8082:8080"
networks:
  shared:
    external: true